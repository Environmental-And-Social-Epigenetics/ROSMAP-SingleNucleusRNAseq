# =============================================================================
# Pipeline variants
# =============================================================================
#
# A "variant" is a named version of the processing pipeline. Variants let you
# experiment (different QC thresholds, doublet method, integration params,
# Harmony key, ...) while keeping ONE declared "primary" pipeline that all
# default runs and downstream analysis resolve to.
#
# HOW TO SWITCH THE PRIMARY PIPELINE: edit the single `primary:` line below.
# Everything else (submit_pipeline.sh, the launcher's --variant primary, and the
# analysis launchers) resolves to whatever you name here.
#
# Each variant may declare:
#   role:               primary | sensitivity | experiment   (label only)
#   harmony_batch_key:  obs column used for Harmony (Stage 3)
#   skip_harmony:       true to use the PCA embedding directly (no correction)
#   output_env:         env var (from config/paths.sh) holding the Stage 3 dir
#   overrides:          optional subtree mirroring config/pipeline.yaml; deep-
#                       merged over the defaults so a variant can change ANY
#                       stage parameter, not just the Harmony key.
#   touches:            list of stages this variant changes vs the primary
#                       (e.g. [stage1, stage3]). Stages NOT listed share the
#                       primary's outputs (written under a `shared` leaf), so
#                       variants that only differ at Stage 3 do not recompute
#                       Stages 1/2. Defaults to [stage3] when omitted.
#   analysis:           optional per-workflow model gating, e.g.
#                         analysis: { ace: { models: [sex_stratified_ace] } }
#
# The keyword `primary` (and its aliases canonical / main / official) resolves
# to the dataset's declared primary variant when passed as --variant.
# =============================================================================

# The single source of truth for which pipeline is primary, per dataset.
# Change a value here to switch the whole primary pipeline in one line.
primary:
  tsai: "derived_batch"
  dejager: "library_id"

datasets:
  tsai:
    # No per-dataset `canonical:` key — the top-level primary: block above is the
    # single source of truth (switch the primary in ONE line). `canonical` still
    # works as an input alias for --variant and resolves to the primary.
    variants:

      # ---- primary + Harmony-key sensitivity variants (Stage 3 only) --------
      derived_batch:
        role: "primary"
        harmony_batch_key: "derived_batch"
        output_env: "TSAI_INTEGRATED"
        description: "Flowcell-derived batch correction; current preferred Tsai integration."
      projid:
        role: "sensitivity"
        harmony_batch_key: "projid"
        output_env: "TSAI_INTEGRATED_PROJID"
        description: "Patient-level Harmony key used by an earlier Tsai integration."
      no_harmony:
        role: "sensitivity"
        skip_harmony: true
        output_env: "TSAI_INTEGRATED_NO_HARMONY"
        description: "No batch correction baseline; PCA embedding is used directly."

      # ---- example whole-pipeline variants (override arbitrary stage params) -
      strict_qc:
        role: "experiment"
        harmony_batch_key: "derived_batch"
        touches: ["stage1", "stage3"]
        overrides:
          stage1:
            qc_filter:
              counts_low_pct: 6.0
              counts_high_pct: 94.0
              mt_pct_threshold: 5.0
          stage3:
            integration:
              n_hvgs: 2000
        description: "Stricter QC percentiles and 5% MT cap; 2000 HVGs."

      hvg5000:
        role: "experiment"
        harmony_batch_key: "derived_batch"
        touches: ["stage3"]
        overrides:
          stage3:
            integration:
              n_hvgs: 5000
              n_pcs: 50
        description: "Higher HVG/PC budget (5000 HVGs, 50 PCs) for a richer embedding."

  dejager:
    variants:
      library_id:
        role: "primary"
        harmony_batch_key: "library_id"
        output_env: "DEJAGER_INTEGRATED"
        description: "Per-library correction; captures library preparation and sequencing effects."
      patient_id:
        role: "sensitivity"
        harmony_batch_key: "patient_id"
        output_env: "DEJAGER_INTEGRATED_PATIENT_ID"
        description: "Patient-level correction sensitivity analysis."
      pool_batch:
        role: "sensitivity"
        harmony_batch_key: "pool_batch"
        output_env: "DEJAGER_INTEGRATED_POOL_BATCH"
        description: "B-number pool batch correction sensitivity analysis."
      derived_batch:
        role: "sensitivity"
        harmony_batch_key: "derived_batch"
        output_env: "DEJAGER_INTEGRATED_DERIVED_BATCH"
        description: "Flowcell-derived correction based on derive_batches.py output."
      sequencing_date:
        role: "sensitivity"
        harmony_batch_key: "sequencing_date"
        output_env: "DEJAGER_INTEGRATED_SEQUENCING_DATE"
        description: "YYMMDD library-name prefix correction sensitivity analysis."
      no_harmony:
        role: "sensitivity"
        skip_harmony: true
        output_env: "DEJAGER_INTEGRATED_NO_HARMONY"
        description: "No batch correction baseline; PCA embedding is used directly."
