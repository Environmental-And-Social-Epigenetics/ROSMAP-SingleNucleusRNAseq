name: Cellbender_env
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python>=3.10
  - pytorch>=2.0
  - pytorch-cuda>=11.8
  - pip
  - pip:
      - cellbender>=0.3
# Note: Requires a GPU with at least 16 GB VRAM (A100 recommended).
# Install with CUDA support matching your cluster's GPU driver.
