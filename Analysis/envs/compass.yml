name: compass_analysis
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pandas>=2.0
  - numpy>=1.24
  - scipy>=1.10
  - pip
  - pip:
      - compass>=0.9
      - scanpy>=1.9
      - anndata>=0.9
# Note: COMPASS requires IBM CPLEX for mixed-integer linear programming.
# Academic licenses available at: https://www.ibm.com/academic/
# After installing CPLEX, set the CPLEX_HOME environment variable or
# install the Python CPLEX bindings: pip install cplex
