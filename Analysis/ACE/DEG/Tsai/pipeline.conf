#!/bin/bash
# pipeline.conf -- Configuration for the ACE DEG analysis pipeline
#
# Source this file from pipeline.sh or individual stage scripts.
# Override any variable by exporting it before running the pipeline.

# ── Analysis parameters ──────────────────────────────────────────────────────
INTEGRATIONS="${INTEGRATIONS:-derived_batch projid}"
PHENOTYPES="${PHENOTYPES:-tot_adverse_exp early_hh_ses ace_aggregate}"

# ── Author / report metadata ─────────────────────────────────────────────────
AUTHOR="${AUTHOR:-Mahmoud Abdelmoneum}"
AFFILIATION="${AFFILIATION:-Tsai Laboratory, MIT}"

# ── SLURM partitions (never use pi_tpoggio) ──────────────────────────────────
SLURM_PARTITION_SMALL="${SLURM_PARTITION_SMALL:-pi_lhtsai,pi_manoli,ou_bcs_normal,mit_normal}"
SLURM_PARTITION_MEDIUM="${SLURM_PARTITION_MEDIUM:-pi_lhtsai,pi_manoli,ou_bcs_normal}"
SLURM_PARTITION_LARGE="${SLURM_PARTITION_LARGE:-pi_lhtsai,pi_manoli}"

# ── GO enrichment parameters ─────────────────────────────────────────────────
GO_MIN_DEGS="${GO_MIN_DEGS:-50}"
GO_TOP_N="${GO_TOP_N:-5}"

# ── Report formatting ────────────────────────────────────────────────────────
REPORT_NO_EM_DASHES="${REPORT_NO_EM_DASHES:-true}"
REPORT_PARSKIP="${REPORT_PARSKIP:-true}"

# ── Broad Exc special handling (INT_MAX sparse matrix limit) ──────────────────
BROAD_EXC_PYTHON_PSEUDOBULK="${BROAD_EXC_PYTHON_PSEUDOBULK:-true}"

# ── Cell types (ordered for display) ─────────────────────────────────────────
CELL_TYPES_BROAD="Exc Inh"
CELL_TYPES_SUB="Ast Endo Ex-L2_3 Ex-L4 Ex-L4_5 Ex-L5 Ex-L5_6 Ex-L5_6-CC Ex-NRGN In-PV_Basket In-PV_Chandelier In-Rosehip In-SST In-VIP Mic Oli OPC"
